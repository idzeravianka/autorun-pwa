<div class="settings-menu">
  <ion-button
    class="settings-menu__button"
    [disabled]="!hasInternetConnection()"
    (click)="navigateTo('settings/connection')"
  >
    Подключение
  </ion-button>
  <ion-button
    class="settings-menu__button"
    [disabled]="!hasInternetConnection()"
    (click)="openTelegram()"
  >
    Телеграм
  </ion-button>
  <div class="version">Версия приложения: {{ version }}</div>
</div>
